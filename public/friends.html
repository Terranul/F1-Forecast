<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- This meta tag ensures that the website renders correctly across different device sizes, enhancing mobile responsiveness. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link to the external CSS stylesheet. Uncomment if you wish to customize or add styling. -->
    <!-- <link rel="stylesheet" href="styles.css">   -->

    <title>F1 Forecast Dashboard</title>
    <link rel="stylesheet" href="dashboardstyles.css">
</head>

<body>
    <div class="friends-container" <h2> Friends Leaderboard </h2>
        <ul id="friends-list" </ul>
    </div>

    <button id="and-button">And</button>
    <button id="or-button">Or</button>
    <div id="query-options">
        <label>
            <input type="radio" name="mode" value="streak" id="streak-radio">
            Streak
        </label>

        <label>
            <input type="radio" name="mode" value="amount" id="amount-radio">
            Amount
        </label>

        <label>
            <input type="radio" name="mode" value="user_name" id="username-radio">
            Username
        </label>
        <label>
            Enter username if you selected username
            <input type="text" id="username-input">
        </label>
        <label>
            Enter number value if you selected amount or streak
            <input type="number" id="number-input">
        </label>
    </div>
    <div id="query-formation"></div>
    <button id="send-query">Submit</button>
    <button id="clear-query">Clear</button>

    <div id="user-info-container">

    </div>



    <script src="dashboard.js"></script>
    <script src="friends.js"></script>
</body>

</html>
