<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- This meta tag ensures that the website renders correctly across different device sizes, enhancing mobile responsiveness. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link to the external CSS stylesheet. Uncomment if you wish to customize or add styling. -->
    <!-- <link rel="stylesheet" href="styles.css">   -->

    <title>F1 Forecast Dashboard</title>
    <link rel="stylesheet" href="dashboardstyles.css">
</head>

<body>
    <h1 id="welcome-message"></h1>

    <div id="information-container">
        <h3 id="user-ranking"></h3>
        <h3 id="user-points"></h3>
        <h3 id="user-ranking"></h3>
        <h3 id="user-streak"></h3>
    </div>

    <div id="points-container">
        <input type="number" id="points-input" placeholder="Enter points" />
        <button id="submit-points">Submit</button>
    </div>

    <div id="edit-container">
        <h3>Edit your profile</h1>
        <label>
            Acc:
            <input type="text" id="acc-input">
        </label>
        <label>
            Score (editing your score will manually increase your balance):
            <input type="number" id="score-input">
        </label>
    </div>
    <button id="edit-user">Submit</button>
    <p id="edit-error"></p>

   

    <script src="dashboard.js"></script>
    <script src="user-profile.js"></script>
</body>

</html>
